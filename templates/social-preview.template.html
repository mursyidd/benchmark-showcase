<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { width: 1200px; height: 630px; margin: 0; overflow: hidden; color: #17191a; background: #f3f0e8; font-family: Georgia, serif; }
    main { display: grid; grid-template-columns: 470px 1fr; height: 100%; border: 16px solid #17191a; }
    .copy { position: relative; padding: 54px 42px; border-right: 6px solid #17191a; background: linear-gradient(150deg, transparent 0 80%, #2556d8 80%); }
    .eyebrow, .facts, .label { font: 800 16px/1.3 Consolas, monospace; text-transform: uppercase; letter-spacing: .06em; }
    h1 { margin: 48px 0 30px; font-size: 72px; line-height: .88; font-weight: 400; }
    h1 em { color: #2556d8; }
    .facts { display: grid; gap: 12px; }
    .facts strong { font-size: 28px; }
    .captures { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 8px; background: #17191a; }
    figure { position: relative; margin: 0; overflow: hidden; background: #fff; }
    img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    figcaption { position: absolute; left: 8px; bottom: 8px; padding: 6px 8px; color: #17191a; background: #d8ff65; border: 2px solid #17191a; font: 800 11px Consolas, monospace; text-transform: uppercase; }
  </style>
</head>
<body>
  <main>
    <section class="copy">
      <p class="eyebrow">Transparent evidence archive</p>
      <h1>Frontend<br><em>Evidence</em><br>Archive</h1>
      <div class="facts"><span><strong>18</strong> runs · <strong>3</strong> configurations</span><span><strong>3</strong> task types · <strong>2</strong> prompt conditions</span><span>No rankings · No superiority claims</span></div>
    </section>
    <section class="captures">
      <figure><img src="{{IMAGE_1}}" alt=""><figcaption>Publication-time derived capture · Case 01</figcaption></figure>
      <figure><img src="{{IMAGE_2}}" alt=""><figcaption>Publication-time derived capture · Case 01</figcaption></figure>
      <figure><img src="{{IMAGE_3}}" alt=""><figcaption>Publication-time derived capture · Case 02</figcaption></figure>
      <figure><img src="{{IMAGE_4}}" alt=""><figcaption>Publication-time derived capture · Case 03</figcaption></figure>
    </section>
  </main>
</body>
</html>
